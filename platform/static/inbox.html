<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#FBF8F1" />
<link rel="apple-touch-icon" href="/static/icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>柯今天想记住的</title>
<!--
  记忆·待确认收件箱（骨架版）——柯回批⑧余力活，待部署。
  照《记忆系统前端要求-给知言》：待确认列表 + 确认/改/不保存三键 + 人话文案。
  小克只起可用骨架（真连后端 /api/memory/pending + /review），玻璃皮沿用同一套主题变量，
  精修/宫格/动效交知言。别删接口契约，套皮就行。
-->
<style>
  :root{
    --bg1:#FAF7F1;--bg2:#F4EEE5;--blob1:rgba(198,163,101,.16);--blob2:rgba(116,62,73,.08);
    --ink:#403A35;--soft:#8E8378;--gold:#C6A365;--gold-deep:#743E49;
    --line:#E7DFD4;--glass:#FFFDF9;--glass2:#F8F3EC;--shadow:none
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,"PingFang SC","Segoe UI",sans-serif;color:var(--ink);
    background:linear-gradient(165deg,var(--bg1),var(--bg2));min-height:100dvh;transition:background .4s}
  body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(70px);z-index:-1;pointer-events:none}
  body::before{width:46vh;height:46vh;top:-12vh;right:-14vh;background:var(--blob1)}
  body::after{width:52vh;height:52vh;bottom:-16vh;left:-16vh;background:var(--blob2)}
  header{padding:12px;text-align:center;position:sticky;top:0;z-index:5;
    background:rgba(250,247,241,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:18px;letter-spacing:1px;color:var(--gold-deep)}
  header .back{position:absolute;left:12px;top:50%;transform:translateY(-50%);border:none;background:none;font-size:22px;color:var(--gold-deep)}
  main{max-width:640px;margin:0 auto;padding:14px 14px calc(30px + env(safe-area-inset-bottom))}
  .hint{font-size:12.5px;color:var(--soft);line-height:1.7;margin:2px 4px 14px}
  .card{background:var(--glass);
    border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .tag{font-size:11px;color:var(--gold-deep);background:var(--glass2);border:1px solid var(--line);border-radius:10px;padding:2px 9px}
  .tag.priv{color:#c2708a}
  .question{margin-bottom:8px;color:var(--gold-deep);font-size:14px;font-weight:600}.body{font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin:2px 0 12px}
  textarea{width:100%;resize:vertical;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:15px;font-family:inherit;min-height:60px;outline:none;
    background:var(--glass);color:var(--ink);margin:4px 0 8px;display:none}
  textarea:focus{border-color:var(--gold)}
  .btns{display:flex;gap:8px;flex-wrap:wrap}
  button.act{min-height:44px;border:1px solid var(--line);background:var(--glass2);border-radius:11px;padding:9px 16px;font-size:14px;font-family:inherit;color:var(--gold-deep)}
  button.ok{border-color:var(--gold-deep);background:var(--gold-deep);color:#fff}
  button.no{color:var(--soft)}
  .empty{text-align:center;color:var(--soft);font-size:14px;padding:40px 10px;line-height:1.8}
</style>
<link rel="stylesheet" href="/static/luxury-quiet.css?v=20260718b">
</head>
<body>
<header>
  <button class="back" onclick="location.href='/'">‹</button>
  <h1>待确认</h1>
</header>
<main>
  <div class="hint">柯可以理解错，所以每一件猜出来的事，都要先问过你。<b>你点头以后，才会真正记住。</b></div>
  <div id="list"></div>
</main>

<script>
  const $=s=>document.querySelector(s);
  // 沿用主页存的主题
  try{const t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}
  async function api(path,opt){const r=await fetch(path,opt);if(r.status===401){alert("服务器仍开着访问保护，需要在部署设置里关闭");throw 0;}return r;}

  function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

  async function load(){
    let rows=[];
    try{ rows=await (await api("/api/memory/pending")).json(); }
    catch(e){ if(e===0)return; $("#list").innerHTML='<div class="empty">加载失败，待部署接通后重试。</div>'; return; }
    if(!rows.length){ $("#list").innerHTML='<div class="empty">这会儿没有待确认的记忆～<br>柯记下新东西时会出现在这里。</div>'; return; }
    $("#list").innerHTML=rows.map(r=>{
      const priv = r.store==="private";
      const src = ({user_explicit:"你亲口说的",ke_inferred:"柯记的",system_summary:"系统总结",legacy:"老记忆"})[r.source]||"柯记的";
      return `<div class="card" data-id="${r.id}" data-store="${r.store}">
        <div class="meta">
          <span class="tag ${priv?'priv':''}">${priv?'🔒 私密（只单聊）':'普通记忆'}</span>
          ${r.topic?`<span class="tag">${esc(r.topic)}</span>`:''}
          <span class="tag">${src}</span>
        </div>
        <div class="question">这件事，我这样记对吗？</div>
        <div class="body">${esc(r.content)}</div>
        <textarea placeholder="改成你想记住的样子…">${esc(r.content)}</textarea>
        <div class="btns">
          <button class="act ok" data-a="ok">记得没错</button>
          <button class="act" data-a="edit">改一改</button>
          <button class="act no" data-a="no">这不是我</button>
        </div>
      </div>`;
    }).join("");
  }

  // 事件委托：三键
  $("#list").addEventListener("click", async e=>{
    const btn=e.target.closest("button[data-a]"); if(!btn)return;
    const card=btn.closest(".card"); const id=card.dataset.id, store=card.dataset.store;
    const ta=card.querySelector("textarea"); const a=btn.dataset.a;
    if(a==="edit"){                       // 展开改写框；再点“确认保存”带上新内容
      if(ta.style.display!=="block"){ ta.style.display="block"; ta.focus(); return; }
    }
    let payload={id:Number(id), store, approve:(a!=="no")};
    if(a!=="no" && ta.style.display==="block" && ta.value.trim()) payload.content=ta.value.trim();
    card.style.opacity=.5;
    try{
      await api("/api/memory/pending/review",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)});
      card.remove();
      if(!$("#list").children.length) load();
    }catch(err){ if(err!==0){ card.style.opacity=1; alert("没存上，再试一下"); } }
  });

  load();
</script>
</body>
</html>
