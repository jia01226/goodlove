<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>群聊</title>
<style>
:root{
  --bg1:#FBF8F1;--bg2:#F6EFE2;--blob1:rgba(201,168,106,.32);--blob2:rgba(232,196,160,.35);
  --ink:#4A4138;--soft:#9C8F7E;--gold:#B8924E;
  --line:rgba(255,255,255,.65);--me:rgba(217,234,211,.82);
  --glass:rgba(255,255,255,.55);--glass2:rgba(255,255,255,.38);
  --shadow:0 8px 32px rgba(150,120,70,.14)
}
html[data-theme="sakura"]{
  --bg1:#FBF3F5;--bg2:#F7E8EE;--blob1:rgba(224,148,171,.30);--blob2:rgba(244,196,210,.40);
  --ink:#54424b;--soft:#a8919b;--gold:#C2708A;--me:rgba(248,224,232,.85);--shadow:0 8px 32px rgba(196,120,146,.15)
}
html[data-theme="mist"]{
  --bg1:#F2F4F9;--bg2:#E9EDF6;--blob1:rgba(140,160,205,.28);--blob2:rgba(180,196,230,.38);
  --ink:#454b5c;--soft:#8d94a8;--gold:#7189BC;--me:rgba(223,231,246,.88);--shadow:0 8px 32px rgba(110,132,180,.15)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);
  background:linear-gradient(165deg,var(--bg1),var(--bg2));
  display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(70px);z-index:-1;pointer-events:none}
body::before{width:46vh;height:46vh;top:-12vh;right:-14vh;background:var(--blob1)}
body::after{width:52vh;height:52vh;bottom:-16vh;left:-16vh;background:var(--blob2)}
header{padding:10px 14px 8px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;
  background:var(--glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5)}
header a{color:var(--soft);text-decoration:none;font-size:15px}
header .ttl{font-weight:700;font-size:16.5px}
header .sub{color:var(--soft);font-size:11.5px;margin-top:1px}
#messages{flex:1;overflow-y:auto;padding:14px 12px 8px;max-width:680px;width:100%;margin:0 auto}
.msg{display:flex;gap:8px;margin-bottom:14px;align-items:flex-start}
.msg .ava{width:34px;height:34px;border-radius:10px;background:var(--glass);border:1px solid var(--line);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg .col{max-width:78%}
.msg .who{font-size:11.5px;color:var(--soft);margin-bottom:3px}
.msg .bubble{background:var(--glass);border:1px solid var(--line);border-radius:4px 14px 14px 14px;
  backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);box-shadow:var(--shadow);
  padding:9px 12px;font-size:15px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg.me{flex-direction:row-reverse}
.msg.me .col{display:flex;flex-direction:column;align-items:flex-end}
.msg.me .bubble{background:var(--me);border-radius:14px 4px 14px 14px}
.typing::after{content:"…";animation:b 1s infinite}
@keyframes b{50%{opacity:.3}}
.empty{text-align:center;color:var(--soft);padding:50px 0;font-size:14px;line-height:2}
footer{border-top:1px solid var(--line);background:var(--glass2);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  padding:8px 10px calc(env(safe-area-inset-bottom) + 8px)}
.ats{display:flex;gap:6px;max-width:680px;margin:0 auto 6px;overflow-x:auto}
.ats button{border:1px solid var(--line);background:var(--glass);color:var(--ink);border-radius:999px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:4px 12px;font-size:13px;white-space:nowrap}
.composer{display:flex;gap:8px;max-width:680px;margin:0 auto}
.composer textarea{flex:1;border:1px solid var(--line);border-radius:14px;padding:10px 14px;font-size:15px;
  resize:none;outline:none;background:var(--glass);color:var(--ink);font-family:inherit;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.composer .send{border:0;background:var(--gold);color:#fff;border-radius:14px;padding:0 18px;font-size:17px}
#gate{position:fixed;inset:0;background:linear-gradient(165deg,var(--bg1),var(--bg2));display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;z-index:9}
#gate input{border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:16px;width:min(320px,80vw);text-align:center;margin:14px 0;background:var(--glass)}
#gate button{border:0;background:var(--ink);color:#fff;border-radius:12px;padding:12px 34px;font-size:16px}
</style>
<script>try{const t=localStorage.getItem("theme");if(t&&t!=="warm")document.documentElement.setAttribute("data-theme",t);}catch(_){}</script>
</head>
<body>
<header>
  <a href="/">‹</a>
  <div><div class="ttl" id="gname">群聊</div><div class="sub" id="gsub">加载中…</div></div>
</header>
<div id="messages"><div class="empty">加载中…</div></div>
<footer>
  <div class="ats" id="ats"></div>
  <div id="pendingBar" style="display:none;align-items:center;gap:8px;max-width:680px;margin:0 auto 6px;padding:6px 8px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:12px">
    <img id="pendingThumb" style="width:40px;height:40px;object-fit:cover;border-radius:8px;display:none" />
    <span id="pendingName" style="flex:1;font-size:13px;color:var(--soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <span onclick="clearPending()" style="color:var(--soft);padding:2px 8px">✕</span>
  </div>
  <div class="composer">
    <button class="send" style="background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);color:var(--gold);font-size:22px;line-height:1" onclick="document.getElementById('file').click()" title="拍照/相册/文件">＋</button>
    <textarea id="input" rows="1" placeholder="说点什么…（@谁 谁答，不@找默认的那位）"></textarea>
    <button class="send" onclick="send()">➤</button>
  </div>
  <input id="file" type="file" style="display:none" onchange="onPickFile(this)" />
</footer>

<div id="gate">
  <div style="font-size:34px">👥</div>
  <input id="pc" type="password" placeholder="悄悄话口令" />
  <button onclick="login()">进来</button>
</div>

<script>
const $=s=>document.querySelector(s);const msgs=$("#messages");
let MEMBERS=[];
async function api(path,opt){const r=await fetch(path,opt);if(r.status===401){$("#gate").style.display="flex";throw 0;}return r;}
async function login(){const r=await fetch("/api/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({passcode:$("#pc").value})});if(r.ok){$("#gate").style.display="none";boot();}else alert("口令不对呀~");}
function scroll(){msgs.scrollTop=msgs.scrollHeight;}
function emojiOf(name){const m=MEMBERS.find(x=>x.name===name);return m?m.emoji:"🤖";}
function fmt(s){const m=String(s||"").match(/[ T](\d{2}:\d{2})/);return m?m[1]:"";}

function isImg(u){return /\.(jpe?g|png|gif|webp|heic|heif|bmp)$/i.test(u||"");}
function bubble(author,text,time,image){
  const me=author==="user";
  const w=document.createElement("div");w.className="msg"+(me?" me":"");
  const name=me?"我":author;
  w.innerHTML=`<div class="ava">${me?"🙂":emojiOf(author)}</div>
    <div class="col"><div class="who">${name}${time?" · "+time:""}</div>
    <div class="bubble"></div></div>`;
  const bb=w.querySelector(".bubble");
  if(image){
    if(isImg(image)){const im=document.createElement("img");im.src=image;im.loading="lazy";
      im.style.cssText="max-width:200px;max-height:240px;border-radius:10px;display:block;cursor:pointer";
      im.onclick=()=>window.open(image);bb.appendChild(im);}
    else{const a=document.createElement("a");a.href=image;a.target="_blank";
      a.textContent="📎 "+image.split("/").pop();a.style.color="var(--gold)";bb.appendChild(a);}
  }
  if(text){const tx=document.createElement("span");tx.textContent=text;
    if(image)tx.style.cssText="display:block;margin-top:6px";bb.appendChild(tx);}
  msgs.appendChild(w);scroll();
  return bb;
}
let pending=null;
async function onPickFile(input){const f=input.files&&input.files[0];input.value="";if(!f)return;
  $("#pendingBar").style.display="flex";$("#pendingThumb").style.display="none";$("#pendingName").textContent="上传中… "+f.name;
  try{const fd=new FormData();fd.append("file",f);const r=await api("/api/upload",{method:"POST",body:fd});const d=await r.json();
    if(d.error){$("#pendingName").textContent="上传失败，再试一次~";return;}
    pending=d;$("#pendingName").textContent=d.name||"已选好";
    if(d.is_image){$("#pendingThumb").src=d.url;$("#pendingThumb").style.display="block";}
  }catch(e){$("#pendingName").textContent="上传失败："+((e&&e.message)||e);}}
function clearPending(){pending=null;$("#pendingBar").style.display="none";$("#pendingThumb").src="";$("#pendingName").textContent="";}

async function boot(){
  try{
    const r=await api("/api/group/members");const g=await r.json();
    MEMBERS=g.members||[];
    $("#gname").textContent=g.group_name||"群聊";
    $("#gsub").textContent=MEMBERS.map(m=>m.emoji+m.name).join(" ")+"（@谁 谁答）";
    $("#ats").innerHTML=MEMBERS.map(m=>`<button onclick="atTa('${m.name}')">@${m.name}</button>`).join("");
    const h=await(await api("/api/group/messages")).json();
    msgs.innerHTML="";
    if(!h.length){msgs.innerHTML=`<div class="empty">群建好了,还没人说话——<br/>@一个人开个头吧 👥</div>`;}
    for(const m of h)bubble(m.author,m.content,fmt(m.created_at),m.image);
  }catch(e){}
}
function atTa(n){const i=$("#input");if(!i.value.includes("@"+n))i.value="@"+n+" "+i.value;i.focus();}

async function send(){
  const t=$("#input").value.trim();const img=pending?pending.url:"";
  if(!t&&!img)return;$("#input").value="";
  if(msgs.querySelector(".empty"))msgs.innerHTML="";
  bubble("user",t,new Date().toTimeString().slice(0,5),img);clearPending();
  let b=null,acc="";
  const r=await api("/api/group/chat",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({text:t,image:img})});
  const reader=r.body.getReader();const dec=new TextDecoder();let buf="";
  while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});
    let i;while((i=buf.indexOf("\n\n"))>=0){const line=buf.slice(0,i);buf=buf.slice(i+2);
      if(!line.startsWith("data:"))continue;
      try{const e=JSON.parse(line.slice(5).trim());
        if(e.speaker){b=bubble(e.speaker,"");b.classList.add("typing");}
        if(e.t&&b){acc+=e.t;b.classList.remove("typing");b.textContent=acc;scroll();}
      }catch(_){}}}
  if(b){b.classList.remove("typing");if(!acc)b.textContent="（没有回应，再试一次~）";}
}
$("#input").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
boot().catch(()=>{});
</script>
</body>
</html>
