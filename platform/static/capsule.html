<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>时间胶囊</title>
<style>
:root{--bg1:#FBF8F1;--bg2:#F6EFE2;--blob1:rgba(201,168,106,.32);--blob2:rgba(232,196,160,.35);
  --ink:#4A4138;--soft:#9C8F7E;--gold:#B8924E;--line:rgba(255,255,255,.65);
  --glass:rgba(255,255,255,.55);--glass2:rgba(255,255,255,.38);--shadow:0 8px 32px rgba(150,120,70,.14)}
html[data-theme="sakura"]{--bg1:#FBF3F5;--bg2:#F7E8EE;--blob1:rgba(224,148,171,.30);--blob2:rgba(244,196,210,.40);--ink:#54424b;--soft:#a8919b;--gold:#C2708A;--shadow:0 8px 32px rgba(196,120,146,.15)}
html[data-theme="mist"]{--bg1:#F2F4F9;--bg2:#E9EDF6;--blob1:rgba(140,160,205,.28);--blob2:rgba(180,196,230,.38);--ink:#454b5c;--soft:#8d94a8;--gold:#7189BC;--shadow:0 8px 32px rgba(110,132,180,.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);min-height:100vh;
  background:linear-gradient(165deg,var(--bg1),var(--bg2));padding:calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 30px)}
body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(70px);z-index:-1}
body::before{width:46vh;height:46vh;top:-12vh;right:-14vh;background:var(--blob1)}
body::after{width:52vh;height:52vh;bottom:-16vh;left:-16vh;background:var(--blob2)}
header{max-width:640px;margin:0 auto 16px}
.back{color:var(--soft);text-decoration:none;font-size:15px}
h1{font-size:26px;margin:8px 0 2px}
.sub{color:var(--soft);font-size:13px}
main{max-width:640px;margin:0 auto}
.card{background:var(--glass);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);
  border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:15px;color:var(--gold);margin-bottom:8px}
input,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;outline:none;margin-top:8px;background:var(--glass2);color:var(--ink)}
textarea{min-height:80px;resize:vertical}
.btn{width:100%;margin-top:12px;padding:12px;border:none;border-radius:12px;background:var(--gold);color:#fff;font-size:15px}
.cap{position:relative}
.cap .when{font-size:12px;color:var(--soft)}
.cap .ttl{font-size:17px;font-weight:700;margin:6px 0}
.cap.sealed .body{filter:blur(6px);user-select:none;pointer-events:none}
.seal{display:inline-block;margin-top:6px;font-size:12.5px;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:2px 10px;background:var(--glass2)}
.cap .body{font-size:15px;line-height:1.8;color:#5c5670;white-space:pre-wrap;margin-top:6px}
.cap img{max-width:100%;border-radius:10px;margin-top:8px}
.del{position:absolute;right:0;top:0;color:var(--soft);padding:4px 8px}
.empty{text-align:center;color:var(--soft);padding:40px 0;line-height:2}
#gate{position:fixed;inset:0;background:linear-gradient(165deg,var(--bg1),var(--bg2));display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;z-index:9}
#gate input{width:min(320px,80vw);text-align:center}#gate button{border:0;background:var(--ink);color:#fff;border-radius:12px;padding:12px 34px;margin-top:14px}
</style>
<script>try{const t=localStorage.getItem("theme");if(t&&t!=="warm")document.documentElement.setAttribute("data-theme",t);}catch(_){}</script>
<link rel="stylesheet" href="/static/luxury-quiet.css?v=20260718b">
</head>
<body>
<header>
  <a class="back" href="/">‹ 返回</a>
  <h1>⏳ 时间胶囊</h1>
  <div class="sub">把此刻的心意封存给未来 · 到日子才开</div>
</header>
<main>
  <div class="card">
    <h2>封存一颗新胶囊 ✦</h2>
    <input id="cTitle" placeholder="给它起个名，比如「给三个月后的我」" />
    <textarea id="cBody" placeholder="写下此刻想说的话…"></textarea>
    <input id="cOpen" type="date" />
    <div class="sub" style="margin-top:4px">↑ 选一个开启日期，那天之前它一直封着</div>
    <button class="btn" onclick="save()">封存 🔒</button>
  </div>
  <div id="list"></div>
</main>

<script>
const $=s=>document.querySelector(s);
async function api(path,opt){const r=await fetch(path,opt);if(r.status===401){alert("服务器仍开着访问保护，需要在部署设置里关闭");throw 0;}return r;}
function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML;}

async function load(){
  const rows=await(await api("/api/capsules")).json();
  const list=$("#list");
  if(!rows.length){list.innerHTML='<div class="empty">还没有胶囊——<br/>封存第一颗吧 ✦</div>';return;}
  list.innerHTML=rows.map(c=>`
    <div class="card cap ${c.opened?'':'sealed'}">
      <span class="del" onclick="del(${c.id})">✕</span>
      <div class="when">开启日 ${c.open_at}</div>
      <div class="ttl">${esc(c.title)}</div>
      ${c.opened
        ? `<div class="body">${esc(c.content)}</div>${c.image?`<img src="${c.image}"/>`:''}`
        : `<span class="seal">🔒 还封着 · ${c.days_left>0?'还有 '+c.days_left+' 天开启':'今天开启'}</span>
           <div class="body">这里封着一段话，到日子就能看啦…这里封着一段话，到日子就能看啦</div>`}
    </div>`).join("");
}
async function save(){
  const title=$("#cTitle").value.trim(),body=$("#cBody").value.trim(),open=$("#cOpen").value;
  if(!title||!body||!open)return alert("名字、内容、开启日都要填哦~");
  await api("/api/capsules",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({title,content:body,open_at:open})});
  $("#cTitle").value="";$("#cBody").value="";$("#cOpen").value="";load();
}
async function del(id){if(!confirm("删掉这颗胶囊？"))return;await api("/api/capsules/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id})});load();}
load().catch(()=>{});
</script>
</body>
</html>
