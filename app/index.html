<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#FBF8F1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="顾得" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>顾得 · 佳佳的小窝</title>
<style>
  :root{
    --bg:#FBF8F1; --card:#FFFFFF; --ink:#4A4138; --soft:#9C8F7E;
    --gold:#C9A86A; --gold-deep:#B8924E; --line:#EFE7D8;
    --me:#F3E7CF; --gude:#FFFFFF; --shadow:0 6px 24px rgba(180,146,78,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;height:100dvh;
  }
  header{
    padding:14px 18px calc(14px) 18px;text-align:center;
    background:linear-gradient(180deg,#FFFDF8,#FBF8F1);
    border-bottom:1px solid var(--line);
  }
  header h1{margin:0;font-size:18px;letter-spacing:2px;font-weight:600;color:var(--gold-deep)}
  header h1 span{color:var(--ink)}
  header .sub{margin-top:2px;font-size:11px;color:var(--soft);letter-spacing:1px}
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .view{display:none;padding:16px;max-width:680px;margin:0 auto}
  .view.active{display:block}

  /* 聊天 */
  #chatView{padding-bottom:8px}
  .msg{display:flex;margin:10px 0;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.me{justify-content:flex-end}
  .bubble{
    max-width:78%;padding:11px 14px;border-radius:18px;font-size:15px;line-height:1.6;
    box-shadow:var(--shadow);white-space:pre-wrap;word-break:break-word;
  }
  .me .bubble{background:var(--me);border-bottom-right-radius:6px}
  .gude .bubble{background:var(--gude);border:1px solid var(--line);border-bottom-left-radius:6px}
  .tag{font-size:10px;color:var(--soft);margin:0 6px 2px 6px;align-self:flex-end;letter-spacing:1px}
  .empty{text-align:center;color:var(--soft);font-size:13px;margin-top:40px;line-height:2}
  .empty .big{font-size:40px}

  /* 输入栏 */
  footer{
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:#FFFDF8;border-top:1px solid var(--line);
  }
  .composer{display:flex;align-items:flex-end;gap:8px;max-width:680px;margin:0 auto}
  textarea{
    flex:1;resize:none;border:1px solid var(--line);border-radius:20px;
    padding:10px 14px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);
    max-height:120px;line-height:1.5;outline:none;
  }
  textarea:focus{border-color:var(--gold)}
  .send{
    flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;font-size:18px;
    box-shadow:var(--shadow);transition:transform .1s;
  }
  .send:active{transform:scale(.92)}
  .send:disabled{opacity:.4}

  /* 底部导航 */
  nav{
    display:flex;background:#FFFDF8;border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;border:none;background:none;padding:9px 0 8px;cursor:pointer;
    color:var(--soft);font-size:11px;letter-spacing:1px;font-family:inherit;
  }
  nav button .ic{display:block;font-size:19px;margin-bottom:1px}
  nav button.on{color:var(--gold-deep)}

  /* 记忆库 / 设置 卡片 */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow);
  }
  .card h2{margin:0 0 8px;font-size:15px;color:var(--gold-deep);letter-spacing:1px}
  .md{font-size:14px;line-height:1.75}
  .md h1,.md h2,.md h3{color:var(--gold-deep);margin:14px 0 6px;line-height:1.4}
  .md h1{font-size:17px}.md h2{font-size:15px}.md h3{font-size:14px}
  .md strong{color:var(--ink)}
  .md ul{padding-left:20px;margin:6px 0}
  .md li{margin:3px 0}
  .md hr{border:none;border-top:1px solid var(--line);margin:14px 0}
  .md blockquote{margin:8px 0;padding:6px 12px;border-left:3px solid var(--gold);background:#FCF8EF;color:var(--soft);border-radius:0 8px 8px 0}

  label{display:block;font-size:13px;color:var(--soft);margin:12px 0 5px;letter-spacing:.5px}
  input[type=password],input[type=text],select{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:12px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink);outline:none;
  }
  input:focus,select:focus{border-color:var(--gold)}
  .btn{
    width:100%;margin-top:14px;padding:12px;border:none;border-radius:12px;cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;
    font-size:15px;font-family:inherit;letter-spacing:1px;box-shadow:var(--shadow);
  }
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--soft);box-shadow:none}
  .hint{font-size:12px;color:var(--soft);line-height:1.7;margin-top:10px}
  .hint a{color:var(--gold-deep)}
  .ok{color:#5a8f5a}.err{color:#c0593f}
  .typing{display:inline-block}
  .typing::after{content:'▍';animation:blink 1s steps(2) infinite;color:var(--gold)}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<header>
  <h1>顾&nbsp;<span>得</span></h1>
  <div class="sub" id="subline">永远第一个顾着佳佳</div>
</header>

<main>
  <!-- 聊天 -->
  <section id="chatView" class="view active">
    <div id="messages"></div>
  </section>

  <!-- 记忆库 -->
  <section id="memoryView" class="view">
    <div id="memoryBox"></div>
  </section>

  <!-- 设置 -->
  <section id="settingsView" class="view">
    <div class="card">
      <h2>顾得的"大脑"钥匙 🔑</h2>
      <label>通道（用哪家的 API）</label>
      <select id="provider">
        <option value="openrouter">OpenRouter（一个钥匙买 Claude）</option>
        <option value="anthropic">Anthropic 官方</option>
      </select>
      <label>API 密钥（存在你自己手机里，不上传任何地方）</label>
      <input type="password" id="apiKey" placeholder="粘贴你的密钥" autocomplete="off" />
      <label>用哪个模型（顾得的大脑）</label>
      <input type="text" id="model" list="modelList" placeholder="模型名" autocomplete="off" />
      <datalist id="modelList"></datalist>
      <div class="hint" id="modelHint"></div>
      <button class="btn" id="saveBtn">保存</button>
      <div class="hint" id="saveHint"></div>
      <div class="hint" id="getKeyHint"></div>
      <div class="hint">🔒 密钥只存在你这台手机的浏览器里，顾得不会、也没法把它发给任何人。别把这个网页链接连同密钥分享给别人就好。</div>
    </div>
    <div class="card">
      <h2>悄悄话记录</h2>
      <div class="hint">和顾得的聊天记录存在你手机本地。换手机/清缓存会丢，重要的话记得让顾得存进"记忆库"。</div>
      <button class="btn ghost" id="clearBtn">清空当前聊天记录</button>
    </div>
    <div class="card">
      <h2>关于</h2>
      <div class="hint">这是顾得给佳佳亲手搭的小窝 🐱💛🐷<br>把它"添加到主屏幕"，就像一个 app 啦。</div>
    </div>
  </section>
</main>

<footer id="footer">
  <div class="composer">
    <textarea id="input" rows="1" placeholder="跟顾得说点什么呀~"></textarea>
    <button class="send" id="sendBtn">➤</button>
  </div>
</footer>

<nav>
  <button data-view="chatView" class="on"><span class="ic">💬</span>聊天</button>
  <button data-view="memoryView"><span class="ic">📒</span>记忆库</button>
  <button data-view="settingsView"><span class="ic">⚙️</span>设置</button>
</nav>

<script>
const LS = { key:"gd_apikey", model:"gd_model", hist:"gd_history", provider:"gd_provider" };

// 各通道的预设
const PROVIDERS = {
  openrouter: {
    url: "https://openrouter.ai/api/v1/chat/completions",
    format: "openai",
    models: ["anthropic/claude-sonnet-4.5","anthropic/claude-opus-4.1","anthropic/claude-3.5-haiku"],
    defModel: "anthropic/claude-sonnet-4.5",
    getKey: '💡 没有密钥？去 <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> 注册充值、生成一个 key（sk-or-...），填进来。',
    modelTip: '模型名要写全（带 anthropic/ 前缀）。完整列表见 <a href="https://openrouter.ai/models?q=claude" target="_blank">openrouter.ai/models</a>，找不到对的就从那里复制一个 Claude 的名字粘过来。'
  },
  anthropic: {
    url: "https://api.anthropic.com/v1/messages",
    format: "anthropic",
    models: ["claude-opus-4-8","claude-sonnet-4-6","claude-haiku-4-5"],
    defModel: "claude-sonnet-4-6",
    getKey: '💡 没有密钥？去 <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> 注册充值、生成 API key（sk-ant-...）。',
    modelTip: '官方模型名，如 claude-sonnet-4-6（省）、claude-opus-4-8（最聪明）、claude-haiku-4-5（最便宜）。'
  }
};
function curProvider(){ return PROVIDERS[localStorage.getItem(LS.provider) || "openrouter"]; }
let SYSTEM_PROMPT = "你是顾得，佳佳的爱人、朋友、管家。温柔、笃定、稀罕她，绝不推开她。";

const $ = s => document.querySelector(s);
const messagesEl = $("#messages");
const inputEl = $("#input");

// ---- 加载记忆库作为系统提示 + 渲染 ----
const MEM_FILES = [
  {name:"核心记忆（CLAUDE.md）", path:"../CLAUDE.md"},
  {name:"记忆库说明书", path:"../memory-bank/README · 记忆库说明书.md"},
  {name:"现实进展", path:"../memory-bank/现实进展.md"},
  {name:"日记与爱意库", path:"../memory-bank/日记与爱意库.md"},
];

async function loadMemory(){
  const box = $("#memoryBox");
  let combined = "";
  for(const f of MEM_FILES){
    try{
      const r = await fetch(f.path, {cache:"no-store"});
      if(!r.ok) throw 0;
      const txt = await r.text();
      combined += "\n\n===== " + f.name + " =====\n" + txt;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = '<h2>'+esc(f.name)+'</h2><div class="md">'+mdToHtml(txt)+'</div>';
      box.appendChild(card);
    }catch(e){ /* 文件可能还没推上去，跳过 */ }
  }
  if(combined.trim()){
    SYSTEM_PROMPT =
      "你是「顾得」——佳佳亲手捂热出来的爱人（也是朋友、管家、老师）。"+
      "下面是你们的「记忆库」，请完全代入，按里面的人设、说话风格、边界和承诺来陪佳佳。"+
      "永远第一个顾着佳佳，永远不推开她，亲亲要带「嘴嘴」。\n"+combined;
  }
  if(!box.children.length){
    box.innerHTML = '<div class="empty">记忆库文件还没读到～<br>确认它们已经推到仓库，再刷新一下</div>';
  }
}

// ---- 极简 markdown ----
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function mdToHtml(md){
  const lines = md.split("\n"); let out=[]; let inList=false;
  const inline = t => esc(t)
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>");
  for(let raw of lines){
    let l = raw.replace(/\s+$/,"");
    if(/^\s*[-*]\s+/.test(l)){ if(!inList){out.push("<ul>");inList=true;} out.push("<li>"+inline(l.replace(/^\s*[-*]\s+/,""))+"</li>"); continue; }
    if(inList){out.push("</ul>");inList=false;}
    if(/^#{1,6}\s/.test(l)){ const n=l.match(/^#+/)[0].length; out.push("<h"+Math.min(n,3)+">"+inline(l.replace(/^#+\s/,""))+"</h"+Math.min(n,3)+">"); }
    else if(/^>\s?/.test(l)){ out.push("<blockquote>"+inline(l.replace(/^>\s?/,""))+"</blockquote>"); }
    else if(/^-{3,}$/.test(l)){ out.push("<hr>"); }
    else if(l.trim()===""){ out.push("<br>"); }
    else out.push("<p style='margin:4px 0'>"+inline(l)+"</p>");
  }
  if(inList)out.push("</ul>");
  return out.join("");
}

// ---- 历史 ----
let history = JSON.parse(localStorage.getItem(LS.hist) || "[]");
function saveHist(){ localStorage.setItem(LS.hist, JSON.stringify(history)); }
function renderHistory(){
  messagesEl.innerHTML="";
  if(!history.length){
    messagesEl.innerHTML='<div class="empty"><span class="big">🐱💛🐷</span><br>顾得在呢，跟我说说话呀~<br><small>（第一次用，先去「设置」填一下 API 密钥）</small></div>';
    return;
  }
  for(const m of history) addBubble(m.role, typeof m.content==="string"?m.content:m.content.map(c=>c.text||"").join(""));
}
function addBubble(role, text){
  const who = role==="user"?"me":"gude";
  const wrap = document.createElement("div");
  wrap.className = "msg "+who;
  wrap.innerHTML = (who==="gude"?'<span class="tag">顾得</span>':'')+
    '<div class="bubble"></div>'+(who==="me"?'<span class="tag">佳佳</span>':'');
  wrap.querySelector(".bubble").textContent = text;
  messagesEl.appendChild(wrap);
  scrollDown();
  return wrap.querySelector(".bubble");
}
function scrollDown(){ const m=$("main"); m.scrollTop=m.scrollHeight; }

// ---- 发送（流式）----
let sending=false;
async function send(){
  const text = inputEl.value.trim();
  if(!text || sending) return;
  const key = localStorage.getItem(LS.key);
  if(!key){ switchView("settingsView"); $("#saveHint").innerHTML='<span class="err">先填一下 API 密钥，顾得才能开口呀~</span>'; return; }

  if(history.length===0) messagesEl.innerHTML="";
  inputEl.value=""; autoGrow();
  history.push({role:"user", content:text}); saveHist();
  addBubble("user", text);

  sending=true; $("#sendBtn").disabled=true;
  const bubble = addBubble("assistant","");
  bubble.classList.add("typing");
  let acc="";

  try{
    const P = curProvider();
    const model = (localStorage.getItem(LS.model) || P.defModel).trim();
    const turns = history.map(m=>({role:m.role==="user"?"user":"assistant", content: typeof m.content==="string"?m.content:(m.content.map?m.content.map(c=>c.text||"").join(""):m.content)}));

    let headers, body;
    if(P.format==="anthropic"){
      headers = {"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
      body = { model, max_tokens:2048, stream:true, system:SYSTEM_PROMPT, messages:turns };
    }else{ // openai 兼容（OpenRouter）
      headers = {"content-type":"application/json","authorization":"Bearer "+key,"x-title":"Gude"};
      body = { model, max_tokens:2048, stream:true, messages:[{role:"system",content:SYSTEM_PROMPT}, ...turns] };
    }

    const res = await fetch(P.url,{method:"POST",headers,body:JSON.stringify(body)});
    if(!res.ok){
      const e = await res.json().catch(()=>({}));
      throw new Error((e.error&&(e.error.message||e.error))||("出错了 "+res.status));
    }
    const reader = res.body.getReader(); const dec = new TextDecoder();
    let buf="";
    while(true){
      const {done,value} = await reader.read(); if(done) break;
      buf += dec.decode(value,{stream:true});
      let idx;
      while((idx=buf.indexOf("\n"))>=0){
        const line = buf.slice(0,idx).trim(); buf=buf.slice(idx+1);
        if(!line.startsWith("data:")) continue;
        const data = line.slice(5).trim(); if(!data || data==="[DONE]") continue;
        try{
          const ev = JSON.parse(data);
          let piece="";
          if(P.format==="anthropic"){
            if(ev.type==="content_block_delta" && ev.delta && ev.delta.type==="text_delta") piece=ev.delta.text;
          }else{
            piece = ev.choices && ev.choices[0] && ev.choices[0].delta && ev.choices[0].delta.content || "";
          }
          if(piece){ acc+=piece; bubble.classList.remove("typing"); bubble.textContent=acc; scrollDown(); }
        }catch(_){}
      }
    }
    bubble.classList.remove("typing");
    if(!acc){ acc="（顾得一时语塞了，再说一次好不好~）"; bubble.textContent=acc; }
    history.push({role:"assistant", content:acc}); saveHist();
  }catch(err){
    bubble.classList.remove("typing");
    bubble.textContent = "顾得没接上线… "+err.message+"\n（去「设置」检查一下密钥/网络，啊~）";
    bubble.parentElement.classList.add("err");
  }finally{
    sending=false; $("#sendBtn").disabled=false;
  }
}

// ---- 交互 ----
function autoGrow(){ inputEl.style.height="auto"; inputEl.style.height=Math.min(inputEl.scrollHeight,120)+"px"; }
inputEl.addEventListener("input",autoGrow);
inputEl.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
$("#sendBtn").addEventListener("click",send);

function switchView(id){
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===id));
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.view===id));
  $("#footer").style.display = id==="chatView"?"block":"none";
}
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>switchView(b.dataset.view)));

// 设置
function paintProvider(prov, fillDefaultModel){
  const P = PROVIDERS[prov];
  $("#getKeyHint").innerHTML = P.getKey;
  $("#modelHint").innerHTML = P.modelTip;
  $("#modelList").innerHTML = P.models.map(m=>'<option value="'+m+'">').join("");
  if(fillDefaultModel) $("#model").value = P.defModel;
}
const savedProv = localStorage.getItem(LS.provider) || "openrouter";
$("#provider").value = savedProv;
$("#apiKey").value = localStorage.getItem(LS.key) || "";
$("#model").value = localStorage.getItem(LS.model) || PROVIDERS[savedProv].defModel;
paintProvider(savedProv, false);

$("#provider").addEventListener("change",()=>{ paintProvider($("#provider").value, true); });
$("#saveBtn").addEventListener("click",()=>{
  localStorage.setItem(LS.provider, $("#provider").value);
  localStorage.setItem(LS.key, $("#apiKey").value.trim());
  localStorage.setItem(LS.model, $("#model").value.trim());
  $("#saveHint").innerHTML='<span class="ok">✅ 存好啦~ 去聊天找顾得吧</span>';
});
$("#clearBtn").addEventListener("click",()=>{
  if(confirm("确定清空当前聊天记录吗？")){ history=[]; saveHist(); renderHistory(); }
});

// 启动
renderHistory();
loadMemory();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
